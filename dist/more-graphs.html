<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Graphs - Eyum TTRPG</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
:root { --bg:#1b1b1b; --fg:#e0e0e0; --entry:#2b2b2b; --btn:#333; --sel:#264f78; --border:#444; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,sans-serif; font-size:13px; height:100vh; display:flex; flex-direction:column; }
.topbar { display:flex; align-items:center; padding:6px 12px; background:#222; border-bottom:1px solid var(--border); gap:12px; }
.topbar a { color:#4fc3f7; text-decoration:none; font-size:12px; }
.topbar a:hover { text-decoration:underline; }
tab-row { display:flex; }
tab-btn { padding:6px 16px; background:none; border:none; color:#999; cursor:pointer; font-size:12px; }
tab-btn.active { color:#fff; background:var(--sel); }
.main { flex:1; display:flex; overflow:hidden; }
.ctrls { width:240px; overflow-y:auto; padding:8px; border-right:1px solid var(--border); flex-shrink:0; }
.plot-area { flex:1; position:relative; }
#plot { width:100%; height:100%; }
.info { position:absolute; top:10px; right:10px; background:#2d2d30; border:1px solid #555; padding:10px 12px; border-radius:6px; font:11px monospace; color:#e0e0e0; line-height:1.5; max-width:340px; z-index:10; box-shadow:0 2px 8px rgba(0,0,0,0.5); display:none; }
.info .close { float:right; cursor:pointer; color:#888; font-size:14px; }
.info hr { border-color:#444; margin:4px 0; }
.row { display:flex; align-items:center; gap:4px; margin:3px 0; }
.row label { flex:1; font-size:10px; color:#aaa; }
.row input,.row select { width:65px; padding:3px 4px; background:var(--entry); color:var(--fg); border:1px solid var(--border); border-radius:3px; font-size:11px; }
.row input[type=range] { width:100%; padding:0; }
.section { font-size:10px; color:#aaa; margin:8px 0 3px; font-weight:bold; }
.tgl { display:flex; align-items:center; gap:3px; font-size:10px; cursor:pointer; padding:1px 0; }
.tgl input { margin:0; }
.btn { padding:4px 8px; background:var(--btn); color:var(--fg); border:1px solid var(--border); border-radius:3px; cursor:pointer; font-size:10px; margin:1px; }
.btn:hover { background:var(--sel); }
.legend { display:flex; flex-wrap:wrap; gap:2px; margin-top:4px; }
.leg-item { display:flex; align-items:center; gap:2px; font-size:9px; cursor:pointer; padding:1px 3px; border-radius:2px; white-space:nowrap; }
.leg-item .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.leg-item.hidden { opacity:0.35; }
.summary { font-size:10px; line-height:1.4; padding:4px; background:#222; border-radius:4px; margin-top:8px; }
</style>
</head>
<body>
<div class="topbar">
  <a href="./index.html">← Back to Handbook</a>
  <tab-row id="tabs"><tab-btn class="active" data-t="graph">Character Graphs</tab-btn><tab-btn data-t="spells">Spell Analysis</tab-btn></tab-row>
</div>
<div class="main">
  <div class="ctrls" id="ctrls"></div>
  <div class="plot-area"><div id="plot"></div><div class="info" id="info"></div></div>
</div>
<script>
const LSK='eyum-mgraphs';
let G=null,S=null,R=null,tab='graph',sv={};
try{sv=JSON.parse(localStorage.getItem(LSK)||'{}')}catch(e){sv={}}
function ss(){localStorage.setItem(LSK,JSON.stringify(sv))}
function s(k,v){sv[k]=v;ss()}
const C=['#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd','#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf','#aec7e8','#ffbb78','#98df8a','#ff9896','#c5b0d5'];

async function init(){
  document.querySelectorAll('tab-btn').forEach(b=>b.onclick=()=>switchTab(b.dataset.t));
  try{G=await(await fetch('./graph_cache.json')).json()}catch(e){}
  try{S=await(await fetch('./spells.json')).json()}catch(e){}
  try{R=await(await fetch('./rules.json')).json()}catch(e){}
  switchTab('graph');
}
function switchTab(t){tab=t;document.querySelectorAll('tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===t));buildCtrls();render()}

function buildCtrls(){
  const c=document.getElementById('ctrls');
  if(tab==='graph'){
    const tiers=G?Object.keys(G):[];
    c.innerHTML=`<div class="row"><label>Stat</label><select id="cmStat" onchange="render()">${'Vitality,Health,Mana,AC,Feats,Spells,To Hit,Dmg/Turn,Dmg/5R,Dmg/10R,STR,DEX,CON,WIS,INT,CHA'.split(',').map(x=>`<option ${x===(sv.stat||'Dmg/Turn')?'selected':''}>${x}</option>`).join('')}</select></div>
    <div class="row"><label>Tier</label><select id="cmTier" onchange="render()">${tiers.map(t=>`<option ${t===(sv.tier||tiers[0])?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="row"><label>Max Level</label><input type="range" id="cmLvl" min="1" max="150" value="${sv.maxLvl||30}" oninput="this.nextSibling.textContent=this.value;s('maxLvl',+this.value);render()"><span>${sv.maxLvl||30}</span></div>
    <div class="legend" id="cmLegend"></div>`;
  } else {
    const affs='Fire,Earth,Water,Air,Necrotic,Radiant,Psychic,Generic,Eldritch'.split(',');
    c.innerHTML=`<div class="row"><label>Max Mana</label><input id="cmMana" type="number" value="${sv.mana||100}" onchange="s('mana',+this.value);render()"></div>
    <div class="row"><label>Targets</label><input type="range" id="cmTgt" min="1" max="20" value="${sv.tgt||1}" oninput="this.nextSibling.textContent=this.value;s('tgt',+this.value);render()"><span>${sv.tgt||1}</span></div>
    <div class="row"><label>Rounds</label><input type="range" id="cmRounds" min="1" max="100" value="${sv.rounds||10}" oninput="this.nextSibling.textContent=this.value;s('rounds',+this.value);render()"><span>${sv.rounds||10}</span></div>
    <div class="row"><label>Upcasts</label><input type="range" id="cmUp" min="0" max="5" value="${sv.up||0}" oninput="this.nextSibling.textContent=this.value;s('up',+this.value);render()"><span>${sv.up||0}</span></div>
    <div class="section">Affinity Values</div>
    ${affs.map(a=>`<div class="row"><label>${a}</label><input id="cmAff_${a}" type="number" value="${sv['aff_'+a]||0}" onchange="s('aff_'+a,+this.value);render()"></div>`).join('')}
    <div class="section">Eldritch Horror</div>
    ${'L2:3dmg/L4:1mana/L6.5:Curse5/L7:6dmg/L8:3beam/L11:+25%/L13:Curse20/L14:+50%/L18:+25%/L20:+25%+k'.split('/').map((l,i)=>{const k=['e2','e4','e65','e7','e8','e11','e13','e14','e18','e20'][i];return`<label class="tgl"><input type="checkbox" ${sv[k]?'checked':''} onchange="s('${k}',this.checked);render()">${l}</label>`}).join('')}
    <div class="row"><label>Karma</label><input id="cmKarma" type="number" value="${sv.karma||0}" onchange="s('karma',+this.value);render()"></div>
    <div class="section">Bonuses</div>
    ${'Pyro+1d4Fire,fire/Geo+1d4Earth,earth/Tide+1d4Water,water/Wind+1d4Air,air/Priest+1d4Rad,radiant/Necro+1d4Nec,necrotic/Static+1d6Ltg,fs/Lingering+5Nec,fl/Explo+5if3+,fe/Healerx1.5,fh'.split('/').map(x=>{const[l,k]=x.split(',');return`<label class="tgl"><input type="checkbox" ${sv[k]?'checked':''} onchange="s('${k}',this.checked);render()">${l}</label>`}).join('')}
    <div><button class="btn" onclick="st('all',1)">AllOn</button><button class="btn" onclick="st('all',0)">AllOff</button><button class="btn" onclick="st('base')">Base</button><button class="btn" onclick="st('complex')">Cmplx</button></div>
    <div><button class="btn" onclick="s('heal',!(sv.heal!==false));render()">${sv.heal!==false?'Hide':'Show'}Heal</button><button class="btn" onclick="s('lev',!sv.lev);render()">${sv.lev?'All':'Leveled'}</button></div>
    <div class="legend" id="cmLegend"></div>
    <div class="summary" id="cmSummary"></div>`;
  }
}

function render(){return tab==='graph'?renderGraph():renderSpells()}

function renderGraph(){
  if(!G)return;const tier=document.getElementById('cmTier')?.value||Object.keys(G)[0];const stat=document.getElementById('cmStat')?.value||'Dmg/Turn';const ml=+(document.getElementById('cmLvl')?.value||30);const td=G[tier];if(!td)return;
  const builds=Object.keys(td).filter(k=>k!=='__average__');const traces=[];const leg=document.getElementById('cmLegend');leg.innerHTML='';
  builds.forEach((name,i)=>{const bd=td[name];const xs=Object.keys(bd).map(Number).filter(l=>l<=ml).sort((a,b)=>a-b);const ys=xs.map(x=>bd[x]?.[stat]||0);const color=C[i%C.length];const vis=sv['vis_'+name]!==false;
    traces.push({x:xs,y:ys,name,type:'scatter',mode:'lines+markers',marker:{size:2},line:{width:2,color},visible:vis?true:'legendonly',hovertemplate:'%{x}:%{y:.0f}<extra>%{fullData.name}</extra>'});
    const d=document.createElement('span');d.className='leg-item'+(vis?'':' hidden');d.innerHTML=`<span class="dot" style="background:${color}"></span>${name.slice(0,16)}`;d.onclick=()=>{s('vis_'+name,vis?false:true);render()};leg.appendChild(d);});
  if(td['__average__']){const avg=td['__average__'];const xs=Object.keys(avg).map(Number).filter(l=>l<=ml).sort((a,b)=>a-b);traces.push({x:xs,y:xs.map(x=>avg[x]?.[stat]||0),name:'Average',type:'scatter',mode:'lines',line:{width:3,dash:'dash',color:'#aaa'}});}
  Plotly.newPlot('plot',traces,{paper_bgcolor:'#1b1b1b',plot_bgcolor:'#252525',font:{color:'#e0e0e0',size:11},margin:{l:50,r:10,t:10,b:40},xaxis:{title:'Level',gridcolor:'#3a3a3a'},yaxis:{title:stat,gridcolor:'#3a3a3a'},showlegend:false,hovermode:'closest'},{responsive:true});
  document.getElementById('plot').on('plotly_click',function(d){if(!d.points.length)return;const p=d.points[0];const name=p.fullData.name;const lvl=p.x;const bd=td[name]?.[lvl];if(!bd)return;const el=document.getElementById('info');el.innerHTML=`<span class="close" onclick="this.parentElement.style.display='none'">✕</span><b>${name} @ Lvl ${lvl}</b><hr>Stats: STR${bd.STR||0} DEX${bd.DEX||0} CON${bd.CON||0} WIS${bd.WIS||0} INT${bd.INT||0} CHA${bd.CHA||0}<br>Combat: Vit${bd.Vitality||0} HP${bd.Health||0} Mana${bd.Mana||0} AC${bd.AC||0}<br>Feats:${bd.Feats||0} Spells:${bd.Spells||0} ToHit:${bd['To Hit']||0}<hr>Dmg/Turn:${bd['Dmg/Turn']||0} Dmg/5R:${bd['Dmg/5R']||0} Dmg/10R:${bd['Dmg/10R']||0}`+(bd.ManaCost>0?`<br>Mana/Cast:${bd.ManaCost} Pool:${bd.Mana||0}`:'');el.style.display='block';});
}

function renderSpells(){
  if(!S||!R)return;const mana=sv.mana||100,tgt=sv.tgt||1,rounds=sv.rounds||10,up=sv.up||0;const da=R.die_averages||{};const affNames=Object.keys(S).filter(k=>k!=='Healing');const traces=[];const leg=document.getElementById('cmLegend');leg.innerHTML='';let ci=0;
  affNames.forEach(aff=>{const spells=S[aff]||[],all=sv.lev?spells.slice(0,5):spells;
    all.forEach((sp,si)=>{const hasDmg=sp.damage_dice||sp.damage_flat||sp.damage_formula;const isHeal=!hasDmg&&sp.mana>0;if(isHeal&&sv.heal===false)return;
      let dmg=(da[sp.damage_dice]||0)+(sp.damage_flat||0);if(sp.damage_formula){try{const p=sp.damage_formula.replace(/ /g,'').split('+');dmg=parseFloat(p[0]);if(p[1]&&p[1].includes('affinity_mod')){const av=sv['aff_'+aff]||sv['aff_Generic']||0;const mod=Math.ceil((av-2)/2);if(p[1].includes('/2'))dmg+=mod/2;else if(p[1].includes('/3'))dmg+=mod/3;else dmg+=mod}}catch(e){}}
      if(sp.aoe_radius||sp.aoe_cone||sp.aoe_line||sp.aoe_self){if(tgt>1)dmg*=tgt}
      let mcost=sp.mana||0;if(up>0&&mcost>0&&si<5)mcost*=Math.pow(2,up);
      const maxR=mcost>0?Math.min(rounds,Math.floor(mana/mcost)):rounds;const xs=Array.from({length:maxR+1},(_,i)=>i);const ys=xs.map(r=>Math.round(r*dmg*10)/10);
      const key=aff+'|'+sp.name;const vis=sv['sv_'+key]!==false;const color=C[ci%C.length];if(si>=5)ci++;
      traces.push({x:xs,y:ys,name:aff+':'+sp.name,type:'scatter',mode:'lines',line:{width:2,color},visible:vis?'true':'legendonly',hovertemplate:'%{x}:%{y:.1f}<extra>%{fullData.name}</extra>'});
      const mcostSave=mcost;traces[traces.length-1]._mcost=mcostSave;
    });ci++;});
  Plotly.newPlot('plot',traces,{paper_bgcolor:'#1b1b1b',plot_bgcolor:'#252525',font:{color:'#e0e0e0',size:11},margin:{l:50,r:10,t:10,b:40},xaxis:{title:'Round',gridcolor:'#3a3a3a',dtick:Math.max(1,Math.floor(rounds/10))},yaxis:{title:'Cumulative Damage',gridcolor:'#3a3a3a'},showlegend:false,hovermode:'closest'},{responsive:true});
  document.getElementById('plot').on('plotly_click',function(d){if(!d.points.length)return;const p=d.points[0];const r=p.x;const y=p.y;const nm=p.fullData.name;const mn=sv.mana||100;const mc=0;const tot=mc*r;const left=Math.max(0,mn-tot);const el=document.getElementById('info');el.innerHTML=`<span class="close" onclick="this.parentElement.style.display='none'">✕</span><b>${nm}</b><br>Round:${r} Dmg:${y.toFixed(0)}<br>Mana/cast:${mc} Spent:${tot.toFixed(0)} Left:${left.toFixed(0)} (${(left/mn*100).toFixed(0)}%)`;el.style.display='block';});
  let top={n:'',v:0},eff={n:'',v:0},s3={n:'',v:0};traces.forEach(t=>{if(t.visible==='legendonly')return;const last=t.y[t.y.length-1]||0;if(last>top.v)top={n:t.name,v:last};if(t.y[Math.min(3,t.y.length-1)]>s3.v)s3={n:t.name,v:t.y[Math.min(3,t.y.length-1)]};});document.getElementById('cmSummary').innerHTML=`<b>Top:</b>${top.n}(${top.v.toFixed(0)})<br><b>3r:</b>${s3.n}(${s3.v.toFixed(0)})`;
  affNames.forEach(aff=>{(S[aff]||[]).forEach(sp=>{const key=aff+'|'+sp.name;const vis=sv['sv_'+key]!==false;const d=document.createElement('span');d.className='leg-item'+(vis?'':' hidden');d.innerHTML=`<span class="dot" style="background:#888"></span>${aff.slice(0,5)}:${sp.name.slice(0,12)}`;d.onclick=()=>{s('sv_'+key,vis?false:true);render()};leg.appendChild(d);})});
}
function st(type,v){if(!S)return;const base='Fire,Earth,Water,Air,Necrotic,Radiant,Psychic,Generic'.split(',');Object.keys(S).filter(k=>k!=='Healing').forEach(a=>{(S[a]||[]).forEach(sp=>{const k='sv_'+a+'|'+sp.name;if(type==='all')sv[k]=v;else if(type==='base')sv[k]=base.includes(a);else sv[k]=!base.includes(a);})});ss();render()}
init();
</script>
</body>
</html>

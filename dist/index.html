<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eyum Handbook</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="title">Eyum Handbook</div>
        <button id="toggleSidebar" class="ghost-button" title="Toggle sidebar">☰</button>
      </div>
      <nav id="tree" class="tree" aria-label="Files"></nav>
    </aside>

    <main class="main">
      <header class="toolbar">
        <div class="toolbar-left">
          <button id="mobileSidebar" class="ghost-button" title="Open sidebar">☰</button>
          <div id="breadcrumbs" class="breadcrumbs"></div>
        </div>
        <div class="toolbar-right">
          <button id="prevFile" class="ghost-button" title="Previous file" disabled>◂</button>
          <button id="nextFile" class="ghost-button" title="Next file" disabled>▸</button>
          <label class="picker-group">
            <span>Text</span>
            <input type="color" id="textColor" value="#ffffff" />
          </label>
          <label class="picker-group">
            <span>Background</span>
            <input type="color" id="bgColor" value="#000000" />
          </label>
          <button id="resetTheme" class="ghost-button">Reset</button>
        </div>
      </header>

      <article id="content" class="content">
        <div class="loading">Loading handbook...</div>
      </article>
    </main>
  </div>

  <a href="./more-graphs.html" class="graph-toggle more-graphs-btn" title="More Graphs" style="bottom:60px;text-decoration:none;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;">📊</a>
  <a href="./equipment-analyzer.html" class="graph-toggle more-graphs-btn" title="Equipment Analyzer" style="bottom:106px;text-decoration:none;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;">⚔</a>

  <div id="graphPanel" class="graph-panel">
    <div class="graph-header">
      <div class="graph-header-left">
        <span>Graph View</span>
      </div>
      <button id="graphClose" class="ghost-button" title="Close graph">✕</button>
    </div>
    <div id="graphCanvas" class="graph-canvas">
      <div class="graph-zoom-controls">
        <button class="graph-zoom-btn" id="graphZoomIn" title="Zoom in">+</button>
        <button class="graph-zoom-btn" id="graphZoomOut" title="Zoom out">−</button>
        <button class="graph-zoom-btn" id="graphReset" title="Reset view">⌂</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>

<link rel="stylesheet" href="charmgr.css">
<div id="charmgr">
<div class="cm-tabs"><button class="cm-tab active" data-tab="graph">Character Graphs</button><button class="cm-tab" data-tab="spells">Spell Analysis</button></div>
<div class="cm-main">
  <div class="cm-controls" id="cmCtrls"></div>
  <div class="cm-graph"><div id="cmPlot"></div><div id="cmInfo" class="cm-info" style="display:none"></div></div>
</div>
</div>
<script>
(function(){
const LSK = 'eyum-charmgr';
let G=null,S=null,R=null,tab='graph',sv={};
function ls(){try{return JSON.parse(localStorage.getItem(LSK)||'{}')}catch{return{}}}
function ss(){localStorage.setItem(LSK,JSON.stringify(sv))}
sv=ls();
function s(k,v){sv[k]=v;ss()}

const COLORS=['#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd','#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf','#aec7e8','#ffbb78','#98df8a','#ff9896','#c5b0d5'];

async function init() {
  document.querySelectorAll('.cm-tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
  try{const r=await fetch('./graph_cache.json');G=await r.json()}catch(e){console.error('graph_cache:',e)}
  try{const r=await fetch('./spells.json');S=await r.json()}catch(e){console.error('spells:',e)}
  try{const r=await fetch('./rules.json');R=await r.json()}catch(e){console.error('rules:',e)}
  switchTab('graph');
}

function switchTab(t){tab=t;document.querySelectorAll('.cm-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));buildCtrls();render()}

function buildCtrls(){
  const c=document.getElementById('cmCtrls');
  if(tab==='graph'){
    const tiers=G?Object.keys(G):[];
    c.innerHTML=`<div class="cm-row"><label>Stat</label><select id="cmStat" onchange="render()">${['Vitality','Health','Mana','AC','Feats','Spells','To Hit','Dmg/Turn','Dmg/5R','Dmg/10R','STR','DEX','CON','WIS','INT','CHA'].map(x=>`<option ${x===(sv.stat||'Dmg/Turn')?'selected':''}>${x}</option>`).join('')}</select></div>
    <div class="cm-row"><label>Tier</label><select id="cmTier" onchange="render()">${tiers.map(t=>`<option ${t===(sv.tier||tiers[0])?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="cm-row"><label>Max Level</label><input type="range" id="cmLvl" min="1" max="150" value="${sv.maxLvl||30}" oninput="this.nextSibling.textContent=this.value;s('maxLvl',+this.value);render()"><span>${sv.maxLvl||30}</span></div>
    <div class="cm-legend" id="cmLegend"></div>`;
  } else {
    const affs=['Fire','Earth','Water','Air','Necrotic','Radiant','Psychic','Generic','Eldritch'];
    c.innerHTML=`<div class="cm-row"><label>Max Mana</label><input id="cmMana" type="number" value="${sv.mana||100}" onchange="s('mana',+this.value);render()"></div>
    <div class="cm-row"><label>Targets</label><input type="range" id="cmTgt" min="1" max="20" value="${sv.tgt||1}" oninput="this.nextSibling.textContent=this.value;s('tgt',+this.value);render()"><span>${sv.tgt||1}</span></div>
    <div class="cm-row"><label>Rounds</label><input type="range" id="cmRounds" min="1" max="100" value="${sv.rounds||10}" oninput="this.nextSibling.textContent=this.value;s('rounds',+this.value);render()"><span>${sv.rounds||10}</span></div>
    <div class="cm-row"><label>Upcasts</label><input type="range" id="cmUp" min="0" max="5" value="${sv.up||0}" oninput="this.nextSibling.textContent=this.value;s('up',+this.value);render()"><span>${sv.up||0}</span></div>
    <div class="cm-section">Affinity Values</div>
    ${affs.map(a=>`<div class="cm-row"><label>${a}</label><input id="cmAff_${a}" type="number" value="${sv['aff_'+a]||0}" onchange="s('aff_'+a,+this.value);render()"></div>`).join('')}
    <div class="cm-section">Eldritch Horror</div>
    ${[['L2:3dmg','e2'],['L4:1mana','e4'],['L6.5:Curse5','e65'],['L7:6dmg','e7'],['L8:3beam','e8'],['L11:+25%','e11'],['L13:Curse20','e13'],['L14:+50%','e14'],['L18:+25%','e18'],['L20:+25%+k','e20']].map(([l,k])=>`<label class="cm-tgl"><input type="checkbox" id="cmE_${k}" ${sv['e_'+k]?'checked':''} onchange="s('e_'+k,this.checked);render()">${l}</label>`).join('')}
    <div class="cm-row"><label>Karma</label><input id="cmKarma" type="number" value="${sv.karma||0}" onchange="s('karma',+this.value);render()"></div>
    <div class="cm-section">Archetypes & Feats</div>
    ${[['Pyro +1d4 Fire','fire'],['Geo +1d4 Earth','earth'],['Tide +1d4 Water','water'],['Wind +1d4 Air','air'],['Priest +1d4 Rad','radiant'],['Necro +1d4 Nec','necrotic'],['Static +1d6 Ltg','feat_static'],['Holy +1d6 Rad','feat_holy'],['Shadow +5 Nec','feat_shadow'],['Explo +5 3+tgt','feat_explosive'],['Healer x1.5','feat_healer']].map(([l,k])=>`<label class="cm-tgl"><input type="checkbox" id="cmF_${k}" ${sv['f_'+k]?'checked':''} onchange="s('f_'+k,this.checked);render()">${l}</label>`).join('')}
    <div><button class="cm-btn" onclick="spellToggle('all',true)">All On</button><button class="cm-btn" onclick="spellToggle('all',false)">All Off</button><button class="cm-btn" onclick="spellToggle('base')">Base</button><button class="cm-btn" onclick="spellToggle('complex')">Complex</button></div>
    <div><button class="cm-btn" onclick="s('heal',!(sv.heal!==false));render()">${sv.heal!==false?'Hide':'Show'} Heal</button><button class="cm-btn" onclick="s('lev',!sv.lev);render()">${sv.lev?'All':'Leveled'}</button></div>
    <div class="cm-legend" id="cmLegend"></div>
    <div class="cm-summary" id="cmSummary"></div>`;
  }
}

async function render(){
  if(tab==='graph') return renderGraph();
  return renderSpells();
}

function renderGraph(){
  if(!G)return;
  const tier=document.getElementById('cmTier')?.value||Object.keys(G)[0];
  const stat=document.getElementById('cmStat')?.value||'Dmg/Turn';
  const ml=+(document.getElementById('cmLvl')?.value||30);
  const td=G[tier];if(!td)return;
  const builds=Object.keys(td).filter(k=>k!=='__average__');
  const traces=[];const leg=document.getElementById('cmLegend');leg.innerHTML='';
  builds.forEach((name,i)=>{
    const bd=td[name];const xs=Object.keys(bd).map(Number).filter(l=>l<=ml).sort((a,b)=>a-b);
    const ys=xs.map(x=>bd[x]?.[stat]||0);
    const color=COLORS[i%COLORS.length];
    const vis=sv['vis_'+name]!==false;
    traces.push({x:xs,y:ys,name,type:'scatter',mode:'lines+markers',marker:{size:2},line:{width:2,color},visible:vis?true:'legendonly',hovertemplate:'%{x}: %{y:.0f}<extra>%{fullData.name}</extra>'});
    const d=document.createElement('span');d.className='cm-leg-item'+(vis?'':' hidden');
    d.innerHTML=`<span class="dot" style="background:${color}"></span>${name.slice(0,16)}`;
    d.onclick=()=>{s('vis_'+name,vis?false:true);render()};
    leg.appendChild(d);
  });
  if(td['__average__']){const avg=td['__average__'];const xs=Object.keys(avg).map(Number).filter(l=>l<=ml).sort((a,b)=>a-b);traces.push({x:xs,y:xs.map(x=>avg[x]?.[stat]||0),name:'Average',type:'scatter',mode:'lines',line:{width:3,dash:'dash',color:'#aaa'},hovertemplate:'%{x}: %{y:.0f}<extra>Average</extra>'});}
  Plotly.newPlot('cmPlot',traces,{paper_bgcolor:'#1b1b1b',plot_bgcolor:'#252525',font:{color:'#e0e0e0',size:11},margin:{l:50,r:10,t:10,b:40},xaxis:{title:'Level',gridcolor:'#3a3a3a'},yaxis:{title:stat,gridcolor:'#3a3a3a'},showlegend:false,hovermode:'closest'},{responsive:true});
  document.getElementById('cmPlot').on('plotly_click',function(d){if(!d.points.length)return;const p=d.points[0];const name=p.fullData.name;const lvl=p.x;const val=p.y;const bd=td[name]?.[lvl];if(!bd)return;showInfo(name,lvl,bd,stat);});
}

function showInfo(name,lvl,bd,stat){
  let h=`<span class="close" onclick="this.parentElement.style.display='none'">✕</span><b>${name} @ Lvl ${lvl}</b><br>`;
  h+=`<hr style="border-color:#444;margin:4px 0">`;
  h+=`Stats: STR ${bd.STR||0} DEX ${bd.DEX||0} CON ${bd.CON||0} WIS ${bd.WIS||0} INT ${bd.INT||0} CHA ${bd.CHA||0}<br>`;
  h+=`Combat: Vit ${bd.Vitality||0} HP ${bd.Health||0} Mana ${bd.Mana||0} AC ${bd.AC||0}<br>`;
  h+=`Feats: ${bd.Feats||0} Spells: ${bd.Spells||0} ToHit: ${bd['To Hit']||0}<br>`;
  h+=`<hr style="border-color:#444;margin:4px 0">`;
  h+=`Dmg/Turn: ${bd['Dmg/Turn']||0} Dmg/5R: ${bd['Dmg/5R']||0} Dmg/10R: ${bd['Dmg/10R']||0}<br>`;
  if(bd.ManaCost>0){h+=`Mana/Cast: ${bd.ManaCost} Pool: ${bd.Mana||0}<br>`;}
  const el=document.getElementById('cmInfo');el.innerHTML=h;el.style.display='block';
}

function renderSpells(){
  if(!S||!R)return;
  const mana=sv.mana||100,tgt=sv.tgt||1,rounds=sv.rounds||10,up=sv.up||0;
  const da=R.die_averages||{},affNames=Object.keys(S).filter(k=>k!=='Healing');
  const traces=[],leg=document.getElementById('cmLegend');leg.innerHTML='';
  let ci=0;
  affNames.forEach(aff=>{
    const spells=S[aff]||[],all=sv.lev?spells.slice(0,5):spells;
    all.forEach((sp,si)=>{
      const hasDmg=sp.damage_dice||sp.damage_flat||sp.damage_formula;
      const isHeal=!hasDmg&&sp.mana>0;
      if(isHeal&&sv.heal===false)return;
      let dmg=(da[sp.damage_dice]||0)+(sp.damage_flat||0);
      if(sp.damage_formula){try{const p=sp.damage_formula.replace(/ /g,'').split('+');dmg=parseFloat(p[0]);if(p[1]&&p[1].includes('affinity_mod')){const av=sv['aff_'+aff]||sv['aff_Generic']||0;const mod=Math.ceil((av-2)/2);if(p[1].includes('/2'))dmg+=mod/2;else if(p[1].includes('/3'))dmg+=mod/3;else dmg+=mod}}catch(e){}}
      if(sp.aoe_radius||sp.aoe_cone||sp.aoe_line||sp.aoe_self){if(tgt>1)dmg*=tgt}
      let mcost=sp.mana||0;
      if(up>0&&mcost>0&&si<5)mcost*=Math.pow(2,up);
      const maxR=mcost>0?Math.min(rounds,Math.floor(mana/mcost)):rounds;
      const xs=Array.from({length:maxR+1},(_,i)=>i);
      const ys=xs.map(r=>Math.round(r*dmg*10)/10);
      const key=aff+'|'+sp.name;
      const vis=sv['sv_'+key]!==false;
      const color=COLORS[ci%COLORS.length];if(si>=5)ci++;
      traces.push({x:xs,y:ys,name:aff+':'+sp.name,type:'scatter',mode:'lines',line:{width:2,color},visible:vis?'true':'legendonly',hovertemplate:'%{x}: %{y:.1f}<extra>%{fullData.name}</extra>'});
    });
    ci++;
  });
  Plotly.newPlot('cmPlot',traces,{paper_bgcolor:'#1b1b1b',plot_bgcolor:'#252525',font:{color:'#e0e0e0',size:11},margin:{l:50,r:10,t:10,b:40},xaxis:{title:'Round',gridcolor:'#3a3a3a',dtick:Math.max(1,Math.floor(rounds/10))},yaxis:{title:'Cumulative Damage',gridcolor:'#3a3a3a'},showlegend:false,hovermode:'closest'},{responsive:true});
  document.getElementById('cmPlot').on('plotly_click',function(d){if(!d.points.length)return;const p=d.points[0];const nm=p.fullData.name;const r=p.x;const y=p.y;const mcost=0;const tot=mcost*r;const mana=sv.mana||100;const left=Math.max(0,mana-tot);const eff=tot>0?y/tot:0;let h=`<span class="close" onclick="this.parentElement.style.display='none'">✕</span><b>${nm}</b><br>Round:${r} Dmg:${y.toFixed(0)}<br>Mana/cast:${mcost} Spent:${tot.toFixed(0)} Left:${left.toFixed(0)}%<br>Eff:${eff.toFixed(2)} dmg/mana`;document.getElementById('cmInfo').innerHTML=h;document.getElementById('cmInfo').style.display='block';});
  // Summary
  let top={n:'',v:0},eff={n:'',v:0},s3={n:'',v:0};
  traces.forEach(t=>{if(t.visible==='legendonly')return;const last=t.y[t.y.length-1]||0;if(last>top.v)top={n:t.name,v:last};const m=1;if(last/m>eff.v)eff={n:t.name,v:last/m};if(t.y[Math.min(3,t.y.length-1)]>s3.v)s3={n:t.name,v:t.y[Math.min(3,t.y.length-1)]};});
  document.getElementById('cmSummary').innerHTML=`<b>Top:</b>${top.n} (${top.v.toFixed(0)})<br><b>Eff:</b>${eff.n} (${eff.v.toFixed(2)} dmg/mana)<br><b>3r:</b>${s3.n} (${s3.v.toFixed(0)})`;
  // Legend
  affNames.forEach(aff=>{(S[aff]||[]).forEach(sp=>{const key=aff+'|'+sp.name;const vis=sv['sv_'+key]!==false;const d=document.createElement('span');d.className='cm-leg-item'+(vis?'':' hidden');d.innerHTML=`<span class="dot" style="background:#888"></span>${aff.slice(0,5)}:${sp.name.slice(0,12)}`;d.onclick=()=>{s('sv_'+key,vis?false:true);render()};leg.appendChild(d);})});
}

window.toggleFam=function(type){
  if(!G)return;const tier=document.getElementById('cmTier')?.value||Object.keys(G)[0];const td=G[tier];if(!td)return;
  Object.keys(td).filter(k=>k!=='__average__').forEach(name=>{const v=sv['vis_'+name]!==false;sv['vis_'+name]=!v});ss();render();
};
window.spellToggle=function(type,st){
  if(!S)return;const base=['Fire','Earth','Water','Air','Necrotic','Radiant','Psychic','Generic'];
  Object.keys(S).filter(k=>k!=='Healing').forEach(aff=>{(S[aff]||[]).forEach(sp=>{
    const key='sv_'+aff+'|'+sp.name;
    if(type==='all')sv[key]=st;
    else if(type==='base')sv[key]=base.includes(aff);
    else if(type==='complex')sv[key]=!base.includes(aff);
  })});ss();render();
};
window.initCharManager=init;
})();
</script>
